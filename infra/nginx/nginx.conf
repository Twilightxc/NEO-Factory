events { 
    worker_connections 1024; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # 🟢 รวมทุกอย่างมาไว้ที่ Port 80 เพื่อหยุดอาการ Restart Loop [cite: 2025-10-27]
    server {
        listen 80;
        server_name _;

        # --- ส่วนที่ 1: Dashboard App (React) ---
        location / {
            # ส่งต่อไปยัง service 'nginx' (ซึ่งใน docker-compose ของคุณคือตัวมันเองที่รัน Dashboard)
            # หรือถ้าแยก service ให้ใช้ชื่อ dashboard [cite: 2026-02-19, 2026-02-22]
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # --- ส่วนที่ 2: ThingsBoard API & Web ---
        location /api/ {
            proxy_pass http://thingsboard:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- ส่วนที่ 3: ThingsBoard WebSocket (Real-time Telemetry) ---
        location /api/ws/ {
            proxy_pass http://thingsboard:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            
            # Optimization สำหรับระบบ Industrial [cite: 2026-02-22]
            proxy_read_timeout 86400; 
            proxy_send_timeout 86400;
            proxy_buffering off;
        }

        # --- ส่วนที่ 4: Sidecar-API (FastAPI Analytics) ---
        location /custom-api/ {
           
            proxy_pass http://sidecar-api:8000/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 10M;
        }
    }
}