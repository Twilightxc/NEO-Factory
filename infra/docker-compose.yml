services:
  db:
    image: "postgres:16"
    container_name: neo-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1024M

  kafka:
    image: bitnamilegacy/kafka:4.0
    container_name: neo-kafka
    restart: always
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LOG_RETENTION_MS=300000
    volumes:
      - ./kafka/data:/bitnami
    deploy:
      resources:
        limits:
          memory: 1024M

  thingsboard:
    image: "thingsboard/tb-node:4.3.0"
    container_name: neo-thingsboard
    restart: always
    depends_on:
      - db
      - kafka
    environment:
      TB_QUEUE_TYPE: kafka
      TB_KAFKA_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
      - "${TB_MQTT_PORT}:1883"
    deploy:
      resources:
        limits:
          memory: 3072M

  sidecar-api:
    build:
      context: ../sidecar-api
      dockerfile: Dockerfile
    container_name: neo-sidecar-api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

  nginx:
    build:
      context: ../dashboard-app
      dockerfile: Dockerfile
    container_name: neo-nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - thingsboard
      - sidecar-api

networks:
  default:
    name: neo-factory-network
